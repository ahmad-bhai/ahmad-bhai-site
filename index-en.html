<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ahmad Bhai</title>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
    body, html { height:100%; width:100%; overflow:hidden; direction:ltr; }

    .bg {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:url('bg.png') center/cover no-repeat;
      filter:blur(12px); transform:scale(1.1); z-index:-2;
    }

    .overlay {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.55); z-index:-1;
    }

    .content {
      height:100%; display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      text-align:center; color:white; padding:20px;
      animation:fadeIn 1.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(20px); }
      to { opacity:1; transform:translateY(0); }
    }

    h1 {
      font-size:48px; letter-spacing:4px; margin-bottom:30px;
      text-shadow:0 0 20px rgba(255,255,255,0.3);
    }

    .logo-box {
      width:160px; height:160px; border-radius:50%;
      overflow:hidden; border:4px solid white;
      animation:glow 2s infinite alternate;
    }

    @keyframes glow {
      from { box-shadow:0 0 10px white; }
      to { box-shadow:0 0 30px #00ffcc; }
    }

    .logo-box img { width:100%; height:100%; object-fit:cover; }

    .btn-group {
      margin-top:35px; display:flex; gap:15px; flex-wrap:wrap; justify-content:center;
    }

    .btn {
      padding:12px 26px; font-size:15px; color:white;
      background:linear-gradient(45deg,#00c6ff,#0072ff);
      border:none; border-radius:30px; cursor:pointer;
      text-decoration:none; transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.4);
    }

    .btn:hover { transform:scale(1.08); box-shadow:0 8px 20px rgba(0,0,0,0.6); }

    @media (max-width:600px){
      h1{font-size:32px;}
      .logo-box{width:120px;height:120px;}
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1>AHMAD BHAI</h1>

    <div class="logo-box">
      <img src="dp.png" alt="Logo">
    </div>

    <div class="btn-group">
      <a href="https://t.me/AhmadTrader3" class="btn" target="_blank">TELEGRAM CONTACT</a>
      <a href="https://api.whatsapp.com/send?phone=+923120883884" class="btn" target="_blank">WHATSAPP CONTACT</a>
    </div>
  </div>

</body>
</html>
